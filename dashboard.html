<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herd Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .header h1 { font-size: 28px; font-weight: 700; }
        .header h1 span { margin-right: 8px; }
        .header-right { display: flex; gap: 16px; align-items: center; }
        .header-meta { display: flex; gap: 16px; align-items: center; font-size: 13px; color: #64748b; }
        .strategy-badge {
            background: rgba(99, 102, 241, 0.15); color: #818cf8;
            padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .pulse { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .update-badge {
            background: rgba(251, 191, 36, 0.15); color: #fbbf24;
            padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
            cursor: pointer;
        }
        .update-badge:hover { background: rgba(251, 191, 36, 0.25); }

        .btn {
            background: rgba(99, 102, 241, 0.15); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: rgba(99, 102, 241, 0.25); border-color: rgba(99, 102, 241, 0.5); }
        .btn-sm { padding: 3px 8px; font-size: 11px; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; margin-bottom: 32px; }

        .card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 20px; position: relative;
            transition: border-color 0.2s, transform 0.2s;
        }
        .card:hover { border-color: rgba(99, 102, 241, 0.3); transform: translateY(-1px); }
        .card.offline { opacity: 0.5; border-color: rgba(239, 68, 68, 0.4); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .card-name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
        .card-actions { display: flex; gap: 6px; }
        .card-status { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; }
        .card-status.online { color: #4ade80; }
        .card-status.offline { color: #ef4444; }
        .dot { width: 7px; height: 7px; border-radius: 50%; }
        .dot.online { background: #4ade80; box-shadow: 0 0 6px rgba(74, 222, 128, 0.4); }
        .dot.offline { background: #ef4444; }

        .meta { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .meta-item {
            font-size: 12px; color: #64748b;
            background: rgba(255,255,255,0.04); padding: 3px 8px; border-radius: 6px;
        }
        .meta-item strong { color: #94a3b8; }

        .gpu-bar { margin-bottom: 12px; }
        .gpu-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-bottom: 4px; }
        .gpu-bar-track { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
        .gpu-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
        .gpu-bar-fill.low { background: #22c55e; }
        .gpu-bar-fill.medium { background: #eab308; }
        .gpu-bar-fill.high { background: #ef4444; }
        .gpu-stats { display: flex; gap: 12px; margin-bottom: 12px; }
        .gpu-stat { font-size: 12px; color: #60a5fa; }

        .model-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.04); }
        .model-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .model-label { font-size: 12px; color: #64748b; }
        .model-value { font-size: 13px; font-weight: 600; color: #818cf8; }
        .model-value.none { color: #475569; font-style: italic; }
        .model-value.match { color: #4ade80; }

        .idle-timer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 10px; padding: 6px 10px; border-radius: 6px; font-size: 12px;
        }
        .idle-timer.warning { background: rgba(251, 191, 36, 0.08); color: #fbbf24; }
        .idle-timer.ok { background: rgba(34, 197, 94, 0.08); color: #22c55e; }
        .idle-timer.homing { background: rgba(239, 68, 68, 0.08); color: #ef4444; }

        /* Analytics Charts Section */
        .analytics-section {
            margin-bottom: 32px;
        }
        .section-header {
            font-size: 20px; font-weight: 700; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 16px;
        }
        .chart-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 20px;
        }
        .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .chart-container {
            position: relative;
            height: 200px;
        }

        .footer {
            margin-top: 24px; padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex; justify-content: space-between;
            font-size: 12px; color: #475569;
        }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            padding: 28px; width: 440px; max-width: 90vw;
        }
        .modal h2 { font-size: 20px; margin-bottom: 20px; }
        .modal label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 4px; margin-top: 14px; }
        .modal label:first-of-type { margin-top: 0; }
        .modal input, .modal select {
            width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04); color: #e2e8f0; font-size: 14px; outline: none;
        }
        .modal input:focus { border-color: rgba(99, 102, 241, 0.5); }
        .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
        .modal-actions .btn-cancel {
            background: transparent; color: #64748b; border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer;
        }
        .modal-actions .btn-submit {
            background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.4);
            padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .modal-actions .btn-submit:hover { background: rgba(99, 102, 241, 0.3); }

        .toast {
            position: fixed; bottom: 24px; right: 24px; padding: 10px 18px; border-radius: 8px;
            font-size: 13px; font-weight: 500; z-index: 200; opacity: 0; transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .toast.error { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span>🦙</span> Herd</h1>
            <div class="header-right">
                <div class="header-meta">
                    <span class="strategy-badge" id="strategy">--</span>
                    <span>Idle: <strong id="idle-timeout">--</strong>m</span>
                    <div class="pulse"></div>
                    <span id="update-badge" class="update-badge" style="display:none;"></span>
                </div>
                <button class="btn" onclick="openAddModal()">+ Add Node</button>
            </div>
        </div>
        
        <div class="grid" id="backends"></div>

        <!-- Analytics Charts -->
        <div class="analytics-section">
            <div class="section-header">
                <span>📊 Analytics (Last 24h)</span>
            </div>
            <div class="chart-grid">
                <div class="chart-card">
                    <div class="chart-title">Request Volume</div>
                    <div class="chart-container">
                        <canvas id="timelineChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">By Model</div>
                    <div class="chart-container">
                        <canvas id="modelChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">By Backend</div>
                    <div class="chart-container">
                        <canvas id="backendChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <span id="last-update">Updating...</span>
            <span id="version-info">Herd v0.1.0</span>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">Add Node</h2>
            <input type="hidden" id="modal-mode" value="add">
            <input type="hidden" id="modal-original-name" value="">
            <label for="f-name">Name</label>
            <input id="f-name" placeholder="e.g. my-server">
            <label for="f-url">URL</label>
            <input id="f-url" placeholder="http://100.x.x.x:11434">
            <label for="f-priority">Priority (higher = preferred)</label>
            <input id="f-priority" type="number" value="50" min="1" max="200">
            <label for="f-default">Default Model</label>
            <input id="f-default" placeholder="e.g. glm-4.7-flash:latest">
            <label for="f-filter">Model Filter (optional)</label>
            <input id="f-filter" placeholder="e.g. ≤8B">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-submit" onclick="submitModal()">Save</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let timelineChart, modelChart, backendChart;

        function formatIdle(seconds) {
            if (seconds < 60) return `${seconds}s`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ${seconds % 60}s`;
            return `${Math.floor(seconds / 3600)}h ${Math.floor((seconds % 3600) / 60)}m`;
        }

        function gpuClass(pct) {
            if (pct < 50) return 'low';
            if (pct < 80) return 'medium';
            return 'high';
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast show ${type}`;
            setTimeout(() => t.className = 'toast', 3000);
        }

        function openAddModal() {
            document.getElementById('modal-title').textContent = 'Add Node';
            document.getElementById('modal-mode').value = 'add';
            document.getElementById('modal-original-name').value = '';
            document.getElementById('f-name').value = '';
            document.getElementById('f-name').disabled = false;
            document.getElementById('f-url').value = '';
            document.getElementById('f-priority').value = '50';
            document.getElementById('f-default').value = '';
            document.getElementById('f-filter').value = '';
            document.getElementById('modal-overlay').classList.add('active');
        }

        function openEditModal(name) {
            fetch(`/admin/backends/${name}`).then(r => r.json()).then(b => {
                document.getElementById('modal-title').textContent = `Edit ${b.name}`;
                document.getElementById('modal-mode').value = 'edit';
                document.getElementById('modal-original-name').value = b.name;
                document.getElementById('f-name').value = b.name;
                document.getElementById('f-name').disabled = true;
                document.getElementById('f-url').value = b.url;
                document.getElementById('f-priority').value = b.priority;
                document.getElementById('f-default').value = b.default_model || '';
                document.getElementById('f-filter').value = b.model_filter || '';
                document.getElementById('modal-overlay').classList.add('active');
            });
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }

        async function submitModal() {
            const mode = document.getElementById('modal-mode').value;
            const name = document.getElementById('f-name').value.trim();
            const url = document.getElementById('f-url').value.trim();
            const priority = parseInt(document.getElementById('f-priority').value) || 50;
            const defaultModel = document.getElementById('f-default').value.trim() || undefined;
            const modelFilter = document.getElementById('f-filter').value.trim() || undefined;

            if (!name || !url) { showToast('Name and URL required', 'error'); return; }

            try {
                if (mode === 'add') {
                    const body = { name, url, priority };
                    if (defaultModel) body.default_model = defaultModel;
                    if (modelFilter) body.model_filter = modelFilter;
                    const res = await fetch('/admin/backends', {
                        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
                    });
                    if (!res.ok) { const t = await res.text(); throw new Error(t); }
                    showToast(`Added ${name}`);
                } else {
                    const body = { url, priority };
                    if (defaultModel) body.default_model = defaultModel;
                    if (modelFilter) body.model_filter = modelFilter;
                    const originalName = document.getElementById('modal-original-name').value;
                    const res = await fetch(`/admin/backends/${originalName}`, {
                        method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
                    });
                    if (!res.ok) { const t = await res.text(); throw new Error(t); }
                    showToast(`Updated ${originalName}`);
                }
                closeModal();
                refresh();
            } catch (e) {
                showToast(`Error: ${e.message}`, 'error');
            }
        }

        async function removeBackend(name) {
            if (!confirm(`Remove ${name}?`)) return;
            try {
                const res = await fetch(`/admin/backends/${name}`, { method: 'DELETE' });
                if (res.ok) { showToast(`Removed ${name}`); refresh(); }
                else showToast('Failed to remove', 'error');
            } catch (e) { showToast(`Error: ${e.message}`, 'error'); }
        }

        function renderCard(b, idleTimeout) {
            const isOnline = b.healthy;
            const cls = isOnline ? 'online' : 'offline';
            const current = b.current_model || null;
            const dflt = b.default_model || null;
            const modelsMatch = current === dflt;
            const idle = b.idle_seconds || 0;
            const idleThresh = idleTimeout * 60;
            const idlePct = dflt ? Math.min(100, Math.round((idle / idleThresh) * 100)) : 0;

            let gpuHtml = '';
            if (b.gpu) {
                const g = b.gpu;
                const usedGB = (g.memory_used / 1024).toFixed(1);
                const totalGB = (g.memory_total / 1024).toFixed(1);
                const pct = g.memory_total > 0 ? Math.round((g.memory_used / g.memory_total) * 100) : 0;
                gpuHtml = `
                    <div class="gpu-bar">
                        <div class="gpu-bar-label"><span>GPU Utilization</span><span>${g.utilization.toFixed(0)}%</span></div>
                        <div class="gpu-bar-track"><div class="gpu-bar-fill ${gpuClass(g.utilization)}" style="width:${g.utilization}%"></div></div>
                    </div>
                    <div class="gpu-bar">
                        <div class="gpu-bar-label"><span>VRAM</span><span>${usedGB} / ${totalGB} GB (${pct}%)</span></div>
                        <div class="gpu-bar-track"><div class="gpu-bar-fill ${gpuClass(pct)}" style="width:${pct}%"></div></div>
                    </div>
                    <div class="gpu-stats">
                        <span class="gpu-stat">Temp: ${g.temperature.toFixed(0)}°C</span>
                    </div>
                `;
            }

            let idleHtml = '';
            if (dflt && !modelsMatch) {
                const remaining = Math.max(0, idleThresh - idle);
                let timerClass = 'warning';
                let label = `Returning to default in ${formatIdle(remaining)}`;
                if (remaining <= 0) { timerClass = 'homing'; label = '⏳ Homing to default model...'; }
                idleHtml = `<div class="idle-timer ${timerClass}"><span>${label}</span><span>${idlePct}%</span></div>`;
            } else if (dflt && modelsMatch) {
                idleHtml = `<div class="idle-timer ok"><span>✓ Running default model</span><span>Idle: ${formatIdle(idle)}</span></div>`;
            }

            return `
                <div class="card ${cls}">
                    <div class="card-header">
                        <span class="card-name">${b.name}</span>
                        <div class="card-actions">
                            <button class="btn btn-sm" onclick="openEditModal('${b.name}')">✏️ Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="removeBackend('${b.name}')">✕</button>
                        </div>
                    </div>
                    <div class="meta">
                        <span class="meta-item">Priority: <strong>${b.priority}</strong></span>
                        <span class="meta-item">Models: <strong>${b.model_count || b.models?.length || 0}</strong></span>
                        <span class="card-status ${cls}"><span class="dot ${cls}"></span>${isOnline ? 'Online' : 'Offline'}</span>
                    </div>
                    ${gpuHtml}
                    <div class="model-section">
                        <div class="model-row">
                            <span class="model-label">Current Model</span>
                            <span class="model-value ${current ? (modelsMatch ? 'match' : '') : 'none'}">${current || 'None'}</span>
                        </div>
                        <div class="model-row">
                            <span class="model-label">Default Model</span>
                            <span class="model-value" style="color:#94a3b8">${dflt || 'Not set'}</span>
                        </div>
                    </div>
                    ${idleHtml}
                </div>
            `;
        }

        function initCharts() {
            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                }
            };

            // Timeline chart (line)
            timelineChart = new Chart(document.getElementById('timelineChart'), {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Requests',
                        data: [],
                        borderColor: '#818cf8',
                        backgroundColor: 'rgba(129, 140, 248, 0.1)',
                        fill: true,
                        tension: 0.4,
                    }]
                },
                options: {
                    ...chartOptions,
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: '#64748b', maxRotation: 0 } }
                    }
                }
            });

            // Model chart (bar)
            modelChart = new Chart(document.getElementById('modelChart'), {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Requests',
                        data: [],
                        backgroundColor: '#818cf8',
                    }]
                },
                options: {
                    ...chartOptions,
                    indexAxis: 'y',
                    scales: {
                        x: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        y: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });

            // Backend chart (bar)
            backendChart = new Chart(document.getElementById('backendChart'), {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Requests',
                        data: [],
                        backgroundColor: '#4ade80',
                    }]
                },
                options: {
                    ...chartOptions,
                    indexAxis: 'y',
                    scales: {
                        x: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        y: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }

        async function updateCharts() {
            try {
                const res = await fetch('/analytics?hours=24');
                const data = await res.json();

                // Timeline chart
                const times = data.timeline.map(t => new Date(t[0] * 1000).toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'}));
                const counts = data.timeline.map(t => t[1]);
                timelineChart.data.labels = times.slice(-20); // Last 20 data points
                timelineChart.data.datasets[0].data = counts.slice(-20);
                timelineChart.update();

                // Model chart (top 5)
                const models = Object.entries(data.model_counts).sort((a, b) => b[1] - a[1]).slice(0, 5);
                modelChart.data.labels = models.map(m => m[0].split(':')[0]);
                modelChart.data.datasets[0].data = models.map(m => m[1]);
                modelChart.update();

                // Backend chart
                const backends = Object.entries(data.backend_counts).sort((a, b) => b[1] - a[1]);
                backendChart.data.labels = backends.map(b => b[0]);
                backendChart.data.datasets[0].data = backends.map(b => b[1]);
                backendChart.update();
            } catch (e) {
                console.error('Failed to update charts:', e);
            }
        }

        async function checkUpdate() {
            try {
                const res = await fetch('/update');
                const data = await res.json();
                if (data.update_available) {
                    const badge = document.getElementById('update-badge');
                    badge.textContent = `v${data.latest} available`;
                    badge.style.display = 'inline-block';
                    badge.onclick = () => window.open(data.download_url, '_blank');
                }
                document.getElementById('version-info').textContent = `Herd v${data.current}`;
            } catch (e) {
                console.error('Update check failed:', e);
            }
        }

        async function refresh() {
            try {
                const [statusRes, gpuRes] = await Promise.all([
                    fetch('/status'),
                    fetch('/gpu').catch(() => null),
                ]);
                const data = await statusRes.json();
                const all = [...(data.healthy_backends || []), ...(data.unhealthy_backends || [])];
                const timeout = data.idle_timeout_minutes || 30;

                // Build a map of backend name -> first GPU from /gpu endpoint
                let gpuMap = {};
                if (gpuRes && gpuRes.ok) {
                    const gpuData = await gpuRes.json();
                    if (gpuData.available && gpuData.backends) {
                        for (const [name, backendData] of Object.entries(gpuData.backends)) {
                            const gpus = Array.isArray(backendData.gpus) ? backendData.gpus : Object.values(backendData.gpus || {});
                            if (gpus.length > 0) gpuMap[name] = gpus[0];
                        }
                    }
                }

                // Merge /gpu data onto each backend (prefer cached gpu_metrics, fall back to live /gpu)
                for (const b of all) {
                    if (!b.gpu && gpuMap[b.name]) b.gpu = gpuMap[b.name];
                }

                document.getElementById('strategy').textContent = data.routing_strategy || '--';
                document.getElementById('idle-timeout').textContent = timeout;
                document.getElementById('backends').innerHTML = all.map(b => renderCard(b, timeout)).join('');
                document.getElementById('last-update').textContent = `Last update: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                document.getElementById('last-update').textContent = `Error: ${e.message}`;
            }
        }

        // Close modal on escape
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        document.getElementById('modal-overlay').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeModal();
        });

        // Initialize
        initCharts();
        refresh();
        updateCharts();
        checkUpdate();
        setInterval(refresh, 5000);
        setInterval(updateCharts, 30000);
    </script>
</body>
</html>
